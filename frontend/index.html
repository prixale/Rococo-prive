<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rococo-prive</title>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        document.body.innerHTML += '<div style="position:fixed;top:0;left:0;width:100vw;height:100vh;background:#1a0005;color:#ff3366;z-index:999999;font-size:18px;padding:40px;overflow:auto;box-sizing:border-box;font-family:monospace;"><h2>❌ Error Crítico (Envía esto por el chat):</h2><p style="font-size:22px;color:white;">' + message + '</p><pre style="white-space:pre-wrap;background:#000;padding:15px;color:#ccc;border:1px solid #ff3366;">' + (error && error.stack ? error.stack : 'No stacktrace available') + '</pre></div>';
      };
      window.addEventListener("unhandledrejection", function(event) {
        document.body.innerHTML += '<div style="position:fixed;top:0;left:0;width:100vw;height:100vh;background:#1a0005;color:#ff3366;z-index:999999;font-size:18px;padding:40px;overflow:auto;box-sizing:border-box;font-family:monospace;"><h2>❌ Error React (Envía esto por el chat):</h2><p style="font-size:22px;color:white;">' + (event.reason ? event.reason.toString() : 'Unknown rejection') + '</p><pre style="white-space:pre-wrap;background:#000;padding:15px;color:#ccc;border:1px solid #ff3366;">' + (event.reason && event.reason.stack ? event.reason.stack : '') + '</pre></div>';
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
